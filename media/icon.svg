<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d2ff"/>
      <stop offset="100%" style="stop-color:#7b2ff7"/>
    </linearGradient>
    <linearGradient id="bracket" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d2ff"/>
      <stop offset="100%" style="stop-color:#3a86ff"/>
    </linearGradient>
    <linearGradient id="check" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f5a0"/>
      <stop offset="100%" style="stop-color:#00d9f5"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="28" ry="28" fill="url(#bg)"/>
  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="32" x2="128" y2="32"/>
    <line x1="0" y1="64" x2="128" y2="64"/>
    <line x1="0" y1="96" x2="128" y2="96"/>
    <line x1="32" y1="0" x2="32" y2="128"/>
    <line x1="64" y1="0" x2="64" y2="128"/>
    <line x1="96" y1="0" x2="96" y2="128"/>
  </g>
  <!-- Left bracket < -->
  <path d="M 44 38 L 22 64 L 44 90" fill="none" stroke="url(#bracket)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right bracket > -->
  <path d="M 84 38 L 106 64 L 84 90" fill="none" stroke="url(#bracket)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Center slash / -->
  <line x1="72" y1="32" x2="56" y2="96" stroke="url(#accent)" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
  <!-- Checkmark -->
  <g transform="translate(78, 76)">
    <circle cx="16" cy="16" r="16" fill="#0d1117" opacity="0.7"/>
    <circle cx="16" cy="16" r="14" fill="none" stroke="url(#check)" stroke-width="2.5"/>
    <path d="M 9 16 L 14 21 L 24 11" fill="none" stroke="url(#check)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Glow effect on brackets -->
  <path d="M 44 38 L 22 64 L 44 90" fill="none" stroke="#00d2ff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" opacity="0.15" filter="blur(4px)"/>
  <path d="M 84 38 L 106 64 L 84 90" fill="none" stroke="#3a86ff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" opacity="0.15" filter="blur(4px)"/>
</svg>
